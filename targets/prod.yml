targets:
  prod:
    mode: production
    workspace:
      host: PLACE_HOLDER_FOR_DATABRICKS_HOST_PRD
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      state_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/state
    variables:
      app_name: multiagent-app
      mlflow_experiment_id: "<PROD-MLFLOW-EXPERIMENT-ID>"
      genie_space_id: "<PROD-GENIE-SPACE-ID>"
      store_manager_genie_space_id: "<PROD-STORE-MANAGER-GENIE-SPACE-ID>"
      executive_genie_space_id: "<PROD-EXECUTIVE-GENIE-SPACE-ID>"
      supply_chain_genie_space_id: "<PROD-SUPPLY-CHAIN-GENIE-SPACE-ID>"
      knowledge_assistant_endpoint_name: "<PROD-KNOWLEDGE-ASSISTANT-ENDPOINT>"
      serving_endpoint_name: "<PROD-SERVING-ENDPOINT>"
      target_app_name: "<PROD-TARGET-APP-NAME>"
      message_bus_backend: uc_table
      message_bus_topic: agent-lifecycle-events
      uc_audit_warehouse_id: "<PROD-UC-AUDIT-WAREHOUSE-ID>"
      uc_audit_catalog: "<PROD-UC-AUDIT-CATALOG>"
      uc_audit_schema: "<PROD-UC-AUDIT-SCHEMA>"
      uc_audit_table: agent_lifecycle_events
    resources:
      apps:
        multiagent-app:
          name: multiagent-app
          resources:
          - name: genie_space
            genie_space:
              name: Genie Space
              space_id: ${var.genie_space_id}
              permission: CAN_RUN
          - name: store_manager_genie_space
            genie_space:
              name: Store Manager Genie Space
              space_id: ${var.store_manager_genie_space_id}
              permission: CAN_RUN
          - name: executive_genie_space
            genie_space:
              name: Executive Genie Space
              space_id: ${var.executive_genie_space_id}
              permission: CAN_RUN
          - name: supply_chain_genie_space
            genie_space:
              name: Supply Chain Genie Space
              space_id: ${var.supply_chain_genie_space_id}
              permission: CAN_RUN