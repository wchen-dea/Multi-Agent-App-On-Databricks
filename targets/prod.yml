targets:
  prod:
    mode: production
    workspace:
      host: PLACE_HOLDER_FOR_DATABRICKS_HOST_PRD
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      state_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/state
    variables:
      app_name: agent-openai-multiagent
      genie_space_id: "<PROD-GENIE-SPACE-ID>"
      knowledge_assistant_endpoint_name: "<PROD-KNOWLEDGE-ASSISTANT-ENDPOINT>"
      serving_endpoint_name: "<PROD-SERVING-ENDPOINT>"
      target_app_name: "<PROD-TARGET-APP-NAME>"
    resources:
      apps:
        multiagent_app:
          name: MULTIAGENT_APP
          resources:
          - name: experiment
            experiment:
              experiment_id: ""
              permission: CAN_MANAGE
          - name: genie_space
            genie_space:
              name: Genie Space
              space_id: ${var.genie_space_id}
              permission: CAN_RUN
          - name: knowledge_assistant
            serving_endpoint:
              name: ${var.knowledge_assistant_endpoint_name}
              permission: CAN_QUERY
          - name: serving_endpoint
            serving_endpoint:
              name: ${var.serving_endpoint_name}
              permission: CAN_QUERY
          - name: agent_app
            app:
              name: ${var.target_app_name}
              permission: CAN_USE