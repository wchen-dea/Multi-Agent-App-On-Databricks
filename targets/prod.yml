targets:
  prod:
    mode: production
    workspace:
      # Platform owner: Databricks workspace URL for PROD.
      # Example: https://dbc-xxxxxxxx-xxxx.cloud.databricks.com
      host: PLACE_HOLDER_FOR_DATABRICKS_HOST_PRD
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      state_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/state
    variables:
      app_name: multiagent-app
      subagents_config_path: "/app/python/source_code/.venv/lib/python3.11/site-packages/backend/domain/subagents.prod.json"
      # MLflow owner: experiment used for traces and eval in PROD.
      # Example: "1234567890123456" (numeric experiment id as string)
      mlflow_experiment_id: "<PROD-MLFLOW-EXPERIMENT-ID>"
      # Data/AI owner: Genie and serving resources for PROD.
      # Example: 01f159f5d91419549020e3609add391c
      genie_space_id: "<PROD-GENIE-SPACE-ID>"
      # Example: 01f159f5d91419549020e3609add391c
      store_manager_genie_space_id: "<PROD-STORE-MANAGER-GENIE-SPACE-ID>"
      # Example: 01f159f5d91419549020e3609add391c
      executive_genie_space_id: "<PROD-EXECUTIVE-GENIE-SPACE-ID>"
      # Example: 01f159f5d91419549020e3609add391c
      supply_chain_genie_space_id: "<PROD-SUPPLY-CHAIN-GENIE-SPACE-ID>"
      # Example: existing serving endpoint name in PROD workspace
      knowledge_assistant_endpoint_name: "<PROD-KNOWLEDGE-ASSISTANT-ENDPOINT>"
      # Example: existing serving endpoint name in PROD workspace
      serving_endpoint_name: "<PROD-SERVING-ENDPOINT>"
      # Example: existing AI search serving endpoint name in PROD workspace
      ai_search_endpoint_name: "<PROD-AI-SEARCH-ENDPOINT>"
      # Example: app name that this app can call, e.g. "analytics-assistant-prod"
      target_app_name: "<PROD-TARGET-APP-NAME>"
      # Observability owner: lifecycle audit sink in PROD.
      message_bus_backend: uc_table
      message_bus_topic: agent-lifecycle-events
      # Example: SQL warehouse id from PROD workspace
      uc_audit_warehouse_id: "<PROD-UC-AUDIT-WAREHOUSE-ID>"
      # Example: Unity Catalog catalog name, e.g. "main"
      uc_audit_catalog: "<PROD-UC-AUDIT-CATALOG>"
      # Example: Unity Catalog schema name, e.g. "observability"
      uc_audit_schema: "<PROD-UC-AUDIT-SCHEMA>"
      uc_audit_table: agent_lifecycle_events
    resources:
      apps:
        multiagent-app:
          name: multiagent-app
          compute_size: MEDIUM
          # Example: policy id, e.g. 06846952-d579-4cd7-ab90-b86f0a1e3ed7
          budget_policy_id: "<PROD-APP-BUDGET-POLICY-ID>"
          # Example: policy id, e.g. 06846952-d579-4cd7-ab90-b86f0a1e3ed7
          usage_policy_id: "<PROD-APP-USAGE-POLICY-ID>"
          # Example scopes from deployed app:
          # - iam.current-user:read
          # - iam.access-control:read
          user_api_scopes:
          - "<PROD-APP-USER-API-SCOPE-1>"
          - "<PROD-APP-USER-API-SCOPE-2>"
          resources:
          - name: genie_space
            genie_space:
              name: Genie Space
              space_id: ${var.genie_space_id}
              permission: CAN_RUN
          - name: store_manager_genie_space
            genie_space:
              name: Store Manager Genie Space
              space_id: ${var.store_manager_genie_space_id}
              permission: CAN_RUN
          - name: executive_genie_space
            genie_space:
              name: Executive Genie Space
              space_id: ${var.executive_genie_space_id}
              permission: CAN_RUN
          - name: supply_chain_genie_space
            genie_space:
              name: Supply Chain Genie Space
              space_id: ${var.supply_chain_genie_space_id}
              permission: CAN_RUN
          - name: ai_search_endpoint
            serving_endpoint:
              name: ${var.ai_search_endpoint_name}
              permission: CAN_QUERY
          - name: knowledge_assistant_product_ep
            serving_endpoint:
              name: ${var.knowledge_assistant_endpoint_name}
              permission: CAN_QUERY