targets:
  dev:
    mode: development
    default: true
    workspace:
      host: PLACE_HOLDER_FOR_DATABRICKS_HOST_DEV
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      state_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/state
    variables:
      app_name: agent-openai-multiagent-dev
      genie_space_id: "<DEV-GENIE-SPACE-ID>"
      knowledge_assistant_endpoint_name: "<DEV-KNOWLEDGE-ASSISTANT-ENDPOINT>"
      serving_endpoint_name: "<DEV-SERVING-ENDPOINT>"
      target_app_name: "<DEV-TARGET-APP-NAME>"
    resources:
      apps:
        agent_openai_agents_sdk_multiagent:
          name: ${var.app_name}
          resources:
          - name: experiment
            experiment:
              experiment_id: ""
              permission: CAN_EDIT
          - name: genie_space
            genie_space:
              name: Genie Space
              space_id: ${var.genie_space_id}
              permission: CAN_RUN
          - name: knowledge_assistant
            serving_endpoint:
              name: ${var.knowledge_assistant_endpoint_name}
              permission: CAN_QUERY
          - name: serving_endpoint
            serving_endpoint:
              name: ${var.serving_endpoint_name}
              permission: CAN_QUERY
          - name: agent_app
            app:
              name: ${var.target_app_name}
              permission: CAN_USE