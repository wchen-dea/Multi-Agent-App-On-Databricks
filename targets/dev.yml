targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-baff2b7f-4402.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      state_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/state
    variables:
      app_name: multiagent-app-dev
      mlflow_experiment_id: "2041388166228723"
      genie_space_id: "01f159f5d91419549020e3609add391c"
      store_manager_genie_space_id: ""
      executive_genie_space_id: ""
      supply_chain_genie_space_id: ""
      message_bus_backend: structured_logging
      message_bus_topic: agent-lifecycle-events
      uc_audit_warehouse_id: ""
      uc_audit_catalog: ""
      uc_audit_schema: ""
      uc_audit_table: agent_lifecycle_events
    resources:
      apps:
        multiagent-app:
          name: multiagent-app-dev
          resources:
          - name: genie_space
            genie_space:
              name: Genie Space
              space_id: ${var.genie_space_id}
              permission: CAN_RUN
          - name: store_manager_genie_space
            genie_space:
              name: Store Manager Genie Space
              space_id: ${var.store_manager_genie_space_id}
              permission: CAN_RUN
          - name: executive_genie_space
            genie_space:
              name: Executive Genie Space
              space_id: ${var.executive_genie_space_id}
              permission: CAN_RUN
          - name: supply_chain_genie_space
            genie_space:
              name: Supply Chain Genie Space
              space_id: ${var.supply_chain_genie_space_id}
              permission: CAN_RUN