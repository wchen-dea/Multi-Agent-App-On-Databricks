targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-baff2b7f-4402.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      state_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/state
    variables:
      app_name: multiagent-app-dev
      genie_space_id: "01f159f5d91419549020e3609add391c"
    resources:
      apps:
        multiagent-app:
          name: multiagent-app-dev
          resources:
          - name: experiment
            experiment:
              experiment_id: ""
              permission: CAN_EDIT
          - name: genie_space
            genie_space:
              name: Genie Space
              space_id: ${var.genie_space_id}
              permission: CAN_RUN
          - name: knowledge_assistant
            serving_endpoint:
              name: ${var.knowledge_assistant_endpoint_name}
              permission: CAN_QUERY
          - name: serving_endpoint
            serving_endpoint:
              name: ${var.serving_endpoint_name}
              permission: CAN_QUERY
          - name: agent_app
            app:
              name: ${var.target_app_name}
              permission: CAN_USE