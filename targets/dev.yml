targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-baff2b7f-4402.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      state_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/state
    variables:
      app_name: multiagent-app-dev
      mlflow_experiment_id: "2041388166228723"
      genie_space_id: "01f159f5d91419549020e3609add391c"
    resources:
      apps:
        multiagent-app:
          name: multiagent-app-dev
          resources:
          - name: genie_space
            genie_space:
              name: Genie Space
              space_id: ${var.genie_space_id}
              permission: CAN_RUN