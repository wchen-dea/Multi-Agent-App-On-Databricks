targets:
  qa:
    mode: development
    workspace:
      # Platform owner: Databricks workspace URL for QA.
      # Example: https://dbc-xxxxxxxx-xxxx.cloud.databricks.com
      host: PLACE_HOLDER_FOR_DATABRICKS_HOST_QA
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
      state_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/state
    variables:
      app_name: multiagent-app-qa
      # MLflow owner: experiment used for traces and eval in QA.
      # Example: "1234567890123456" (numeric experiment id as string)
      mlflow_experiment_id: "<QA-MLFLOW-EXPERIMENT-ID>"
      # Data/AI owner: Genie and serving resources for QA.
      # Example: 01f159f5d91419549020e3609add391c
      genie_space_id: "<QA-GENIE-SPACE-ID>"
      # Example: 01f159f5d91419549020e3609add391c
      store_manager_genie_space_id: "<QA-STORE-MANAGER-GENIE-SPACE-ID>"
      # Example: 01f159f5d91419549020e3609add391c
      executive_genie_space_id: "<QA-EXECUTIVE-GENIE-SPACE-ID>"
      # Example: 01f159f5d91419549020e3609add391c
      supply_chain_genie_space_id: "<QA-SUPPLY-CHAIN-GENIE-SPACE-ID>"
      # Example: existing serving endpoint name in QA workspace
      knowledge_assistant_endpoint_name: "<QA-KNOWLEDGE-ASSISTANT-ENDPOINT>"
      # Example: existing serving endpoint name in QA workspace
      serving_endpoint_name: "<QA-SERVING-ENDPOINT>"
      # Example: existing AI search serving endpoint name in QA workspace
      ai_search_endpoint_name: "<QA-AI-SEARCH-ENDPOINT>"
      # Example: app name that this app can call, e.g. "analytics-assistant-qa"
      target_app_name: "<QA-TARGET-APP-NAME>"
      # Observability owner: lifecycle audit sink in QA.
      message_bus_backend: uc_table
      message_bus_topic: agent-lifecycle-events
      # Example: SQL warehouse id from QA workspace
      uc_audit_warehouse_id: "<QA-UC-AUDIT-WAREHOUSE-ID>"
      # Example: Unity Catalog catalog name, e.g. "main"
      uc_audit_catalog: "<QA-UC-AUDIT-CATALOG>"
      # Example: Unity Catalog schema name, e.g. "observability"
      uc_audit_schema: "<QA-UC-AUDIT-SCHEMA>"
      uc_audit_table: agent_lifecycle_events
    resources:
      apps:
        multiagent-app:
          name: multiagent-app
          resources:
          - name: genie_space
            genie_space:
              name: Genie Space
              space_id: ${var.genie_space_id}
              permission: CAN_RUN
          - name: store_manager_genie_space
            genie_space:
              name: Store Manager Genie Space
              space_id: ${var.store_manager_genie_space_id}
              permission: CAN_RUN
          - name: executive_genie_space
            genie_space:
              name: Executive Genie Space
              space_id: ${var.executive_genie_space_id}
              permission: CAN_RUN
          - name: supply_chain_genie_space
            genie_space:
              name: Supply Chain Genie Space
              space_id: ${var.supply_chain_genie_space_id}
              permission: CAN_RUN
          - name: ai_search_endpoint
            serving_endpoint:
              name: ${var.ai_search_endpoint_name}
              permission: CAN_QUERY