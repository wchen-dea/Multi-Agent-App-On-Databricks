resources:
  apps:
    multiagent-app:
      name: ${var.app_name}
      description: "Multi-agent orchestrator that queries other agents, Genie spaces, and serving endpoints"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
        - name: MLFLOW_TRACKING_URI
          value: ${var.mlflow_tracking_uri}
        - name: MLFLOW_REGISTRY_URI
          value: ${var.mlflow_registry_uri}
        - name: API_PROXY
          value: ${var.api_proxy}
        - name: CHAT_APP_PORT
          value: ${var.chat_app_port}
        - name: CHAT_PROXY_TIMEOUT_SECONDS
          value: ${var.chat_proxy_timeout_seconds}
        - name: MLFLOW_EXPERIMENT_ID
          value: ${var.mlflow_experiment_id}
        - name: MESSAGE_BUS_BACKEND
          value: ${var.message_bus_backend}
        - name: MESSAGE_BUS_TOPIC
          value: ${var.message_bus_topic}
        - name: UC_AUDIT_WAREHOUSE_ID
          value: ${var.uc_audit_warehouse_id}
        - name: UC_AUDIT_CATALOG
          value: ${var.uc_audit_catalog}
        - name: UC_AUDIT_SCHEMA
          value: ${var.uc_audit_schema}
        - name: UC_AUDIT_TABLE
          value: ${var.uc_audit_table}
      # Resources which this app has access to
      resources:
      - name: 'genie_space'
        genie_space:
          name: 'Genie Space'
          space_id: ${var.genie_space_id}
          permission: 'CAN_RUN'