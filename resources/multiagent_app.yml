resources:
  apps:
    multiagent-app:
      name: ${var.app_name}
      description: "Multi-agent orchestrator that queries other agents, Genie spaces, and serving endpoints"
      # App access control: assign principals that can use/manage this app.
      # permissions:
      # - level: CAN_USE
      #   service_principal_name: ${var.app_can_use_service_principal_id}
      # - level: CAN_MANAGE
      #   service_principal_name: ${var.app_can_manage_service_principal_id}
      # Optional app properties supported by the Databricks bundle schema.
      # Keep commented unless you intend to enable them for this deployment.
      # budget_policy_id: ${var.app_budget_policy_id}
      # compute_min_instances: 1
      # compute_max_instances: 2
      # compute_size: MEDIUM
      # git_repository:
      #   provider: gitHub
      #   url: https://github.com/wchen-dea/Multi-Agent-App-On-Databricks
      # git_source:
      #   branch: main
      #   source_code_path: .
      # lifecycle:
      #   prevent_destroy: false
      #   started: true
      # permissions:
      # - level: CAN_USE
      #   group_name: users
      # space: my-space
      # telemetry_export_destinations:
      # - unity_catalog:
      #     logs_table: main.observability.app_logs
      # usage_policy_id: ${var.app_usage_policy_id}
      # user_api_scopes:
      # - sql
      # - serving-endpoints
      source_code_path: ../.databricks_app_source
      config:
        command: ["python", "launcher.py"]
        env:
        - name: MLFLOW_TRACKING_URI
          value: ${var.mlflow_tracking_uri}
        - name: MLFLOW_REGISTRY_URI
          value: ${var.mlflow_registry_uri}
        - name: API_PROXY
          value: ${var.api_proxy}
        - name: CHAT_APP_PORT
          value: ${var.chat_app_port}
        - name: CHAT_PROXY_TIMEOUT_SECONDS
          value: ${var.chat_proxy_timeout_seconds}
        - name: SUBAGENTS_CONFIG_PATH
          value: ${var.subagents_config_path}
        - name: DEFAULT_REQUEST_PERSONA
          value: ${var.default_request_persona}
        - name: MLFLOW_EXPERIMENT_ID
          value: ${var.mlflow_experiment_id}
        - name: MESSAGE_BUS_BACKEND
          value: ${var.message_bus_backend}
        - name: MESSAGE_BUS_TOPIC
          value: ${var.message_bus_topic}
        - name: UC_AUDIT_WAREHOUSE_ID
          value: ${var.uc_audit_warehouse_id}
        - name: UC_AUDIT_CATALOG
          value: ${var.uc_audit_catalog}
        - name: UC_AUDIT_SCHEMA
          value: ${var.uc_audit_schema}
        - name: UC_AUDIT_TABLE
          value: ${var.uc_audit_table}
      # Resources which this app has access to
      resources:
      - name: 'genie_space'
        genie_space:
          name: 'Genie Space'
          space_id: ${var.genie_space_id}
          permission: 'CAN_RUN'