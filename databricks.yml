bundle:
  name: multiagent-app-on-databricks
  uuid: ad3ec8f6-1ff5-4bb2-bbb7-056bd09c43a8
include:
- resources/*.yml
- targets/*.yml
- resources/*/*.yml
variables:
  app_name:
    description: Databricks app name for the current environment
  mlflow_experiment_id:
    description: MLflow experiment ID for tracing/evaluation in the current environment
  mlflow_tracking_uri:
    description: MLFLOW_TRACKING_URI for the app
    default: databricks
  mlflow_registry_uri:
    description: MLFLOW_REGISTRY_URI for the app
    default: databricks-uc
  api_proxy:
    description: API proxy URL for the chat app
    default: http://localhost:8000/invocations
  chat_app_port:
    description: CHAT_APP_PORT for the chat app
    default: "3000"
  chat_proxy_timeout_seconds:
    description: CHAT_PROXY_TIMEOUT_SECONDS for the chat app
    default: "300"
  genie_space_id:
    description: Genie space ID for the current environment
    default: ""
  store_manager_genie_space_id:
    description: Store Manager Genie space ID for the current environment
    default: ""
  executive_genie_space_id:
    description: Executive Genie space ID for the current environment
    default: ""
  supply_chain_genie_space_id:
    description: Supply Chain Genie space ID for the current environment
    default: ""
  knowledge_assistant_endpoint_name:
    description: Knowledge assistant serving endpoint name for the current environment
    default: ""
  serving_endpoint_name:
    description: Primary serving endpoint name for the current environment
    default: ""
  target_app_name:
    description: Target Databricks app name granted CAN_USE for the current environment
    default: ""
  message_bus_backend:
    description: Message bus backend (structured_logging, noop, kafka, rabbitmq, uc_table)
    default: structured_logging
  message_bus_topic:
    description: Message bus topic/exchange name
    default: agent-lifecycle-events
  uc_audit_warehouse_id:
    description: SQL warehouse id used for UC audit table writes
    default: ""
  uc_audit_catalog:
    description: Unity Catalog catalog for audit event table
    default: ""
  uc_audit_schema:
    description: Unity Catalog schema for audit event table
    default: ""
  uc_audit_table:
    description: Unity Catalog table name for lifecycle events
    default: agent_lifecycle_events