bundle:
  name: multiagent-app-on-databricks
  uuid: ad3ec8f6-1ff5-4bb2-bbb7-056bd09c43a8
include:
- resources/*.yml
- targets/*.yml
- resources/*/*.yml
variables:
  app_name:
    description: Databricks app name for the current environment
  mlflow_experiment_id:
    description: MLflow experiment ID for tracing/evaluation in the current environment
  mlflow_tracking_uri:
    description: MLFLOW_TRACKING_URI for the app
    default: databricks
  mlflow_registry_uri:
    description: MLFLOW_REGISTRY_URI for the app
    default: databricks-uc
  api_proxy:
    description: API proxy URL for the chat app
    default: http://localhost:8000/invocations
  chat_app_port:
    description: CHAT_APP_PORT for the chat app
    default: "3000"
  chat_proxy_timeout_seconds:
    description: CHAT_PROXY_TIMEOUT_SECONDS for the chat app
    default: "300"
  genie_space_id:
    description: Genie space ID for the current environment
    default: ""
  knowledge_assistant_endpoint_name:
    description: Knowledge assistant serving endpoint name for the current environment
    default: ""
  serving_endpoint_name:
    description: Primary serving endpoint name for the current environment
    default: ""
  target_app_name:
    description: Target Databricks app name granted CAN_USE for the current environment
    default: ""