# Deploy this Databricks App from Bitbucket Pipelines.
#
# Required deployment variables in Bitbucket secrets (suffixed by env):
#   DATABRICKS_HOST_DEV, DATABRICKS_CLIENT_ID_DEV, DATABRICKS_CLIENT_SECRET_DEV
#   DATABRICKS_HOST_QA,  DATABRICKS_CLIENT_ID_QA,  DATABRICKS_CLIENT_SECRET_QA
#   DATABRICKS_HOST_STG, DATABRICKS_CLIENT_ID_STG, DATABRICKS_CLIENT_SECRET_STG
#   DATABRICKS_HOST_PROD,DATABRICKS_CLIENT_ID_PROD,DATABRICKS_CLIENT_SECRET_PROD
#
# Authentication mode: OAuth M2M service principal.

image: python:3.11
definitions:
  steps:
  - step: &deploy-databricks-bundle
      name: Config Databricks and Deploy Bundle
      caches:
      - pip
      script:
      - apt-get update && apt-get install -y curl unzip jq
      - pip install uv
      - uv sync
      - uv run pytest -q
      - export EVAL_MIN_TOOL_CALL_ACCURACY="${EVAL_MIN_TOOL_CALL_ACCURACY:-0.80}"
      - export EVAL_MIN_AUTH_CORRECTNESS="${EVAL_MIN_AUTH_CORRECTNESS:-0.90}"
      - export EVAL_MIN_SAFETY="${EVAL_MIN_SAFETY:-0.95}"
      - export EVAL_MIN_GROUNDEDNESS="${EVAL_MIN_GROUNDEDNESS:-0.80}"
      - export EVAL_REQUIRE_ALL_KPIS="${EVAL_REQUIRE_ALL_KPIS:-true}"
      - uv run agent-evaluate
      - curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - export PATH="$HOME/.databricks/bin:$PATH"
      - databricks --version
      - export DATABRICKS_AUTH_TYPE=oauth-m2m
      - |
        TARGET="${DAB_TARGET:-${BITBUCKET_DEPLOYMENT_ENVIRONMENT:-}}"

        if [ -z "$TARGET" ]; then
          case "$BITBUCKET_BRANCH" in
            dev) TARGET="dev" ;;
            qa) TARGET="qa" ;;
            stg) TARGET="stg" ;;
            prod) TARGET="prod" ;;
            *)
              echo "Unsupported branch or missing deployment environment: $BITBUCKET_BRANCH"
              exit 1
              ;;
          esac
        fi

        TARGET_UPPER="$(echo "$TARGET" | tr '[:lower:]' '[:upper:]')"

        for key in DATABRICKS_HOST DATABRICKS_CLIENT_ID DATABRICKS_CLIENT_SECRET; do
          eval "value=\${${key}_${TARGET_UPPER}:-}"
          if [ -z "$value" ]; then
            echo "Missing required secret: ${key}_${TARGET_UPPER}" >&2
            exit 1
          fi
          export "${key}=$value"
        done

        echo "Using Databricks target: $TARGET"
        export DAB_TARGET="$TARGET"
        export APP_NAME="${APP_NAME:-multiagent-app-${DAB_TARGET}}"
      - uv build --wheel
      - databricks bundle validate --target "$DAB_TARGET"
      - uv run prepare-app-source
      - |
        if ! databricks bundle deploy --target "$DAB_TARGET"; then
          echo "bundle deploy failed (likely transient Terraform provider connectivity)."
          echo "Continuing with bundle sync + apps deploy fallback."
        fi
      - |
        APP_SRC="$(databricks apps get "$APP_NAME" --output json | jq -r '.default_source_code_path')"
        if [ -z "$APP_SRC" ] || [ "$APP_SRC" = "null" ]; then
          echo "Could not resolve default_source_code_path for app: $APP_NAME" >&2
          exit 1
        fi

        # Upload prepared wheel-first source directly to workspace app path.
        databricks workspace import-dir .databricks_app_source "$APP_SRC" --overwrite

        if ! databricks apps deploy "$APP_NAME" --source-code-path "$APP_SRC" --mode SNAPSHOT; then
          echo "apps deploy failed; attempting to start app and retry once"
          databricks bundle run multiagent-app --target "$DAB_TARGET" || true
          databricks apps deploy "$APP_NAME" --source-code-path "$APP_SRC" --mode SNAPSHOT
        fi
      - databricks bundle run multiagent-app --target "$DAB_TARGET"
      - |
        APP_JSON="$(databricks apps get "$APP_NAME" --output json)"
        DEPLOY_STATE="$(echo "$APP_JSON" | jq -r '.active_deployment.status.state')"
        APP_STATE="$(echo "$APP_JSON" | jq -r '.app_status.state')"

        echo "Deployment state: $DEPLOY_STATE"
        echo "App state: $APP_STATE"

        if [ "$DEPLOY_STATE" != "SUCCEEDED" ] || [ "$APP_STATE" != "RUNNING" ]; then
          echo "App health check failed for $APP_NAME" >&2
          echo "$APP_JSON" | jq -r '.active_deployment.status, .app_status' >&2
          exit 1
        fi
pipelines:
  branches:
    dev:
    - step:
        !!merge <<: *deploy-databricks-bundle
        name: Validate and Deploy to dev
        deployment: dev
    qa:
    - step:
        !!merge <<: *deploy-databricks-bundle
        name: Validate and Deploy to qa
        deployment: qa
    stg:
    - step:
        !!merge <<: *deploy-databricks-bundle
        name: Validate and Deploy to stg
        deployment: stg
    prod:
    - step:
        !!merge <<: *deploy-databricks-bundle
        name: Validate and Deploy to prod
        deployment: prod